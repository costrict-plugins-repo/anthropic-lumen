apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: default
data:
  config.yaml: |
    server:
      port: 8080
      host: 0.0.0.0
    database:
      host: postgres
      port: 5432
      name: appdb
    redis:
      host: redis
      port: 6379
  app.properties: |
    app.name=MyApp
    app.version=1.0.0
    log.level=INFO
